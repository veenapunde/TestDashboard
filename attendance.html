<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance – Student Progress System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="app-container">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>🎓 Student Tracker</h2>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="dashboard.html"   class="nav-item">📊 Dashboard</a>
      <a href="students.html"    class="nav-item">👨‍🎓 Students</a>
      <a href="courses.html"     class="nav-item">📚 Courses</a>
      <div class="sidebar-section-label">Management</div>
      <a href="enrollments.html" class="nav-item">📝 Enrollments</a>
      <a href="progress.html"    class="nav-item">📈 Progress</a>
      <a href="attendance.html"  class="nav-item active">✅ Attendance</a>
      <div class="sidebar-section-label">Insights</div>
      <a href="analytics.html"   class="nav-item">📉 Analytics</a>
      <a href="colleges.html"    class="nav-item">🏛️ Colleges</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="name">Admin</div>
          <div class="role">Administrator</div>
        </div>
      </div>
      <button type="button" id="logoutBtn" class="btn btn-ghost btn-block">🚪 Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <h1>✅ Attendance</h1>
      </div>
      <div class="top-bar-right">
        <button type="button" id="refreshBtn" class="btn btn-secondary">🔄 Refresh</button>
      </div>
    </header>

    <div class="content-section">
      <!-- Form -->
      <div class="attendance-form-card">
        <h3>📅 Mark Attendance</h3>
        <form id="attendanceForm">
          <div class="form-row">
            <div class="form-group">
              <label>Select Student</label>
              <select id="studentSelect" required>
                <option value="">— Choose Student —</option>
              </select>
            </div>
            <div class="form-group">
              <label>Select Course</label>
              <select id="courseSelect" required>
                <option value="">— Choose Course —</option>
              </select>
            </div>
          </div>
          <div class="form-row" style="margin-top:4px;">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="attendanceDate" required/>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="attendanceStatus" required>
                <option value="Present">✅ Present</option>
                <option value="Absent">❌ Absent</option>
              </select>
            </div>
          </div>
          <div class="form-actions" style="margin-top:12px;">
            <button type="submit" class="btn btn-primary">Mark Attendance</button>
            <button type="reset"  class="btn btn-secondary">Reset</button>
          </div>
        </form>
      </div>

      <!-- History -->
      <div class="attendance-history-card">
        <h3>📋 Attendance History</h3>
        <div class="search-bar" style="margin-bottom:14px;">
          <input type="text" id="searchInput" placeholder="Search attendance records…"/>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr><th>Student</th><th>Course</th><th>Date</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="attendanceTableBody">
              <tr><td colspan="5" class="text-center loading">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script>
  function getStudents()     { return JSON.parse(localStorage.getItem('sps_students')   || '[]'); }
  function getCourses()      { return JSON.parse(localStorage.getItem('sps_courses')    || '[]'); }
  function getAttendance()   { return JSON.parse(localStorage.getItem('sps_attendance') || '[]'); }
  function saveAttendance(a) { localStorage.setItem('sps_attendance', JSON.stringify(a)); }
  function nextId(arr)       { return arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1; }
  function escHtml(s)        { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function fillDropdowns() {
    const ssel = document.getElementById('studentSelect');
    const csel = document.getElementById('courseSelect');
    ssel.innerHTML = '<option value="">— Choose Student —</option>';
    csel.innerHTML = '<option value="">— Choose Course —</option>';
    getStudents().forEach(s => {
      const o = document.createElement('option');
      o.value = s.id; o.textContent = `${s.name} (${s.email})`;
      ssel.appendChild(o);
    });
    getCourses().forEach(c => {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.course_name;
      csel.appendChild(o);
    });
  }

  function loadAttendance() {
    const tbody      = document.getElementById('attendanceTableBody');
    const attendance = getAttendance();
    const students   = getStudents();
    const courses    = getCourses();
    if (!attendance.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center">No attendance records yet.</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    [...attendance].reverse().forEach(a => {
      const sName = (students.find(s => s.id === a.student_id) || {}).name || 'Unknown';
      const cName = (courses.find(c => c.id === a.course_id)   || {}).course_name || 'Unknown';
      const date  = a.date
        ? new Date(a.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        : '—';
      const statusBadge = a.status === 'Present'
        ? '<span class="badge badge-success">✅ Present</span>'
        : '<span class="badge badge-danger">❌ Absent</span>';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${escHtml(sName)}</strong></td>
        <td><span class="badge badge-info">${escHtml(cName)}</span></td>
        <td style="color:var(--text-muted);font-size:12px;">${date}</td>
        <td>${statusBadge}</td>
        <td>
          <button type="button" class="btn btn-sm btn-danger" onclick="deleteAttendance(${a.id})">🗑 Delete</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  document.getElementById('attendanceForm').addEventListener('submit', e => {
    e.preventDefault();
    const studentId = parseInt(document.getElementById('studentSelect').value);
    const courseId  = parseInt(document.getElementById('courseSelect').value);
    const date      = document.getElementById('attendanceDate').value;
    const status    = document.getElementById('attendanceStatus').value;
    if (!studentId || !courseId || !date) { showToast('Please fill all fields', 'error'); return; }

    const attendance = getAttendance();
    if (attendance.find(a => a.student_id === studentId && a.course_id === courseId && a.date === date)) {
      showToast('Attendance already marked for this date', 'error'); return;
    }
    attendance.push({ id: nextId(attendance), student_id: studentId, course_id: courseId, date, status });
    saveAttendance(attendance);
    showToast('Attendance marked! ✅', 'success');
    document.getElementById('attendanceForm').reset();
    document.getElementById('attendanceDate').value = new Date().toISOString().split('T')[0];
    loadAttendance();
  });

  window.deleteAttendance = id => {
    if (!confirm('Delete this attendance record?')) return;
    saveAttendance(getAttendance().filter(a => a.id !== id));
    showToast('Record deleted ✅', 'success');
    loadAttendance();
  };

  document.getElementById('searchInput').addEventListener('input', e => {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('#attendanceTableBody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', () => { fillDropdowns(); loadAttendance(); });
  document.getElementById('attendanceDate').value = new Date().toISOString().split('T')[0];

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  document.getElementById('hamburger').addEventListener('click', () => {
    const open = sidebar.classList.toggle('open');
    overlay.classList.toggle('open', open);
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    if (confirm('Logout karna chahte ho?')) window.location.href = 'index.html';
  });

  fillDropdowns();
  loadAttendance();
</script>
</body>
</html>
