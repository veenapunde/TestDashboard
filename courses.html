<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Courses – Student Progress System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="app-container">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>🎓 Student Tracker</h2>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="dashboard.html"   class="nav-item">📊 Dashboard</a>
      <a href="students.html"    class="nav-item">👨‍🎓 Students</a>
      <a href="courses.html"     class="nav-item active">📚 Courses</a>
      <div class="sidebar-section-label">Management</div>
      <a href="enrollments.html" class="nav-item">📝 Enrollments</a>
      <a href="progress.html"    class="nav-item">📈 Progress</a>
      <a href="attendance.html"  class="nav-item">✅ Attendance</a>
      <div class="sidebar-section-label">Insights</div>
      <a href="analytics.html"   class="nav-item">📉 Analytics</a>
      <a href="colleges.html"    class="nav-item">🏛️ Colleges</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="name">Admin</div>
          <div class="role">Administrator</div>
        </div>
      </div>
      <button type="button" id="logoutBtn" class="btn btn-ghost btn-block">🚪 Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <h1>📚 Courses</h1>
      </div>
      <div class="top-bar-right">
        <button type="button" id="addCourseBtn" class="btn btn-primary">+ Add Course</button>
      </div>
    </header>

    <div class="content-section">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search courses…"/>
      </div>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th><th>Course Name</th><th>Instructor</th><th>Duration</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="coursesTableBody">
            <tr><td colspan="5" class="text-center loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="courseModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Add Course</h2>
      <button type="button" class="close-btn" id="closeModal">&times;</button>
    </div>
    <form id="courseForm">
      <input type="hidden" id="courseId"/>
      <div class="form-group">
        <label>Course Name *</label>
        <input type="text" id="courseName" placeholder="e.g. Introduction to Python" required/>
      </div>
      <div class="form-group" style="margin-top:4px;">
        <label>Instructor Name</label>
        <input type="text" id="instructorName" placeholder="e.g. Dr. John Smith"/>
      </div>
      <div class="form-group" style="margin-top:4px;margin-bottom:20px;">
        <label>Duration</label>
        <input type="text" id="duration" placeholder="e.g. 8 weeks"/>
      </div>
      <button type="submit" class="btn btn-primary btn-block">💾 Save Course</button>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script>
  function getCourses()     { return JSON.parse(localStorage.getItem('sps_courses') || '[]'); }
  function saveCourses(arr) { localStorage.setItem('sps_courses', JSON.stringify(arr)); }
  function nextId(arr)      { return arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1; }
  function escHtml(s)       { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function loadCourses() {
    const tbody = document.getElementById('coursesTableBody');
    const courses = getCourses();
    if (!courses.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center">No courses found. Add one above!</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    [...courses].reverse().forEach(c => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:var(--text-muted);font-size:12px;">#${c.id}</td>
        <td><strong>${escHtml(c.course_name)}</strong></td>
        <td>${c.instructor_name ? escHtml(c.instructor_name) : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td>${c.duration ? `<span class="badge badge-info">${escHtml(c.duration)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td style="white-space:nowrap;">
          <button type="button" class="btn btn-sm btn-edit" onclick="editCourse(${c.id})" style="margin-right:5px;">✏️ Edit</button>
          <button type="button" class="btn btn-sm btn-danger" onclick="deleteCourse(${c.id})">🗑 Delete</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function openModal()  { document.getElementById('courseModal').classList.add('open'); }
  function closeModal() { document.getElementById('courseModal').classList.remove('open'); }

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('courseModal').addEventListener('click', e => {
    if (e.target === document.getElementById('courseModal')) closeModal();
  });

  document.getElementById('addCourseBtn').addEventListener('click', () => {
    document.getElementById('courseId').value = '';
    document.getElementById('courseForm').reset();
    document.getElementById('modalTitle').textContent = 'Add Course';
    openModal();
  });

  window.editCourse = id => {
    const c = getCourses().find(x => x.id === id);
    if (!c) { showToast('Course not found', 'error'); return; }
    document.getElementById('courseId').value       = c.id;
    document.getElementById('courseName').value     = c.course_name;
    document.getElementById('instructorName').value = c.instructor_name || '';
    document.getElementById('duration').value       = c.duration || '';
    document.getElementById('modalTitle').textContent = 'Edit Course';
    openModal();
  };

  window.deleteCourse = id => {
    if (!confirm('Delete this course? All related enrollments and progress will also be removed.')) return;
    saveCourses(getCourses().filter(c => c.id !== id));
    // Also remove related enrollments and progress
    const enr = JSON.parse(localStorage.getItem('sps_enrollments') || '[]').filter(e => e.course_id !== id);
    localStorage.setItem('sps_enrollments', JSON.stringify(enr));
    const prg = JSON.parse(localStorage.getItem('sps_progress') || '[]').filter(p => p.course_id !== id);
    localStorage.setItem('sps_progress', JSON.stringify(prg));
    showToast('Course deleted ✅', 'success');
    loadCourses();
  };

  document.getElementById('courseForm').addEventListener('submit', e => {
    e.preventDefault();
    const id = parseInt(document.getElementById('courseId').value) || null;
    const payload = {
      course_name:     document.getElementById('courseName').value.trim(),
      instructor_name: document.getElementById('instructorName').value.trim(),
      duration:        document.getElementById('duration').value.trim(),
    };
    let courses = getCourses();
    if (id) {
      courses = courses.map(c => c.id === id ? { ...c, ...payload } : c);
      saveCourses(courses);
      showToast('Course updated! ✅', 'success');
    } else {
      courses.push({ id: nextId(courses), ...payload, created_at: new Date().toISOString() });
      saveCourses(courses);
      showToast('Course added! ✅', 'success');
    }
    closeModal(); loadCourses();
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('#coursesTableBody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
    });
  });

  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  document.getElementById('hamburger').addEventListener('click', () => {
    const open = sidebar.classList.toggle('open');
    overlay.classList.toggle('open', open);
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    if (confirm('Logout karna chahte ho?')) window.location.href = 'index.html';
  });

  loadCourses();
</script>
</body>
</html>
